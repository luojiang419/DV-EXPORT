server {
    listen 80;
    server_name __DOMAIN__;

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name __DOMAIN__;

    ssl_certificate     /www/sites/__DOMAIN__/ssl/fullchain.pem;
    ssl_certificate_key /www/sites/__DOMAIN__/ssl/privkey.pem;

    root /www/sites/__DOMAIN__;
    index index.html;
    client_max_body_size 1m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    location ^~ /api/dv-export-support/ {
        proxy_pass http://127.0.0.1:__BACKEND_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    location ^~ /downloads/ {
        try_files $uri =404;
        expires 1d;
        add_header Content-Disposition "attachment";
    }

    location ^~ /support/ {
        try_files $uri =404;
        expires 1d;
    }

    location = /index.html {
        expires -1;
    }

    location = /sponsors.html {
        expires -1;
    }

    location = /sponsors-admin.html {
        expires -1;
    }

    location = /demo/index.html {
        expires -1;
    }

    location ^~ /demo/ {
        try_files $uri $uri/ /demo/index.html;
        expires 7d;
    }

    location ~* \.(js|css|png|jpg|jpeg|webp|ico)$ {
        try_files $uri =404;
        expires 7d;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
